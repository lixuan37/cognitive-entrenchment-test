<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字水罐问题 — 认知固着度测试</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="water-jug.css">
</head>
<body>
<div class="page-wrapper">
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="icon">&#9881;</div>
        认知固着度测试
      </div>
      <span class="header-badge" id="progressBadge">谜题 1/4</span>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="container">

      <!-- 进度条 -->
      <div class="progress-bar mb-4">
        <div class="progress-bar-fill" id="globalProgress" style="width: 0%;"></div>
      </div>
      <p class="progress-text">谜题 1 / 4 — 数字水罐</p>

      <!-- 题目信息 -->
      <div class="card puzzle-header">
        <div class="flex justify-between items-center">
          <div>
            <h3 id="questionLabel">第 1 题 / 共 6 题</h3>
            <p class="text-sm text-muted" id="questionDesc">用 A、B、C 三个水罐，倒出目标水量</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-sm text-muted">操作次数：</span>
            <span class="font-mono font-bold" id="stepCount">0</span>
          </div>
        </div>
      </div>

      <!-- 主体：左图 + 右操作（两栏并排） -->
      <div class="puzzle-two-col">

        <!-- 左栏：水罐可视化 -->
        <div class="puzzle-left">
          <div class="card puzzle-canvas-card">
            <div class="canvas-wrapper">
              <!-- 参数区 -->
              <div class="jug-params">
                <div class="param-block" id="paramA">
                  <div class="param-label" style="color: #6366F1;">罐 A</div>
                  <div class="param-capacity">容量 <span class="font-mono" id="capA">11</span> L</div>
                  <div class="param-current">当前 <span class="font-mono" id="curA">0</span> L</div>
                </div>
                <div class="param-block" id="paramB">
                  <div class="param-label" style="color: #10B981;">罐 B</div>
                  <div class="param-capacity">容量 <span class="font-mono" id="capB">27</span> L</div>
                  <div class="param-current">当前 <span class="font-mono" id="curB">0</span> L</div>
                </div>
                <div class="param-block" id="paramC">
                  <div class="param-label" style="color: #F59E0B;">罐 C</div>
                  <div class="param-capacity">容量 <span class="font-mono" id="capC">3</span> L</div>
                  <div class="param-current">当前 <span class="font-mono" id="curC">0</span> L</div>
                </div>
                <div class="target-block">
                  <div class="param-label" style="color: #EF4444;">&#9679; 目标</div>
                  <div class="param-current"><span class="font-mono font-bold" id="targetVol">10</span> L</div>
                </div>
              </div>
              <!-- Canvas -->
              <div class="canvas-area">
                <canvas id="jugCanvas" width="330" height="320"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- 右栏：操作区 -->
        <div class="puzzle-right">
          <div class="card" id="controlsCard" style="height:100%; box-sizing:border-box; display:flex; flex-direction:column;">
            <p class="text-sm text-muted" style="margin-bottom: var(--spacing-3);">
              选择操作，使目标水罐中精确达到目标水量。
            </p>

            <div class="action-columns" id="actionGrid" style="flex:1;">
              <div class="action-col">
                <div class="action-col-header">
                  <span class="col-dot" style="background:#6366F1;"></span>
                  <span class="col-dot" style="background:#10B981;"></span>
                  <span class="col-dot" style="background:#F59E0B;"></span>
                  装满 / 倒空
                </div>
                <div class="action-col-body" id="fillEmptyCol"></div>
              </div>
              <div class="action-col">
                <div class="action-col-header">
                  <span>&#8594;</span> 倒水操作
                </div>
                <div class="action-col-body" id="pourCol"></div>
              </div>
            </div>

            <!-- 跳过面板（15 步后出现） -->
            <div class="skip-container" id="skipContainer" style="display:none; margin-top:var(--spacing-3); text-align:center;">
              <p class="text-sm text-muted" style="margin-bottom:6px;">&#9432; 如果暂时做不出来，可以跳过继续下一题。请按自己的真实思路作答即可。</p>
              <button class="btn btn-outline btn-sm" id="skipBtn" style="border-color:#F59E0B; color:#F59E0B;">
                &#9888; 跳过此题
              </button>
            </div>

            <!-- 底部控制 -->
            <div class="flex justify-between" style="margin-top: var(--spacing-4); padding-top: var(--spacing-3); border-top: 1px solid var(--color-border-light);">
              <div class="flex items-center gap-3">
                <button class="btn btn-ghost btn-sm" id="resetBtn" disabled>
                  &#8634; 重置
                </button>
                <button class="btn-subtle-skip" id="subtleSkipBtn" title="放弃当前题目">
                  &#10005; 放弃此题
                </button>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-secondary" id="checkBtn" disabled>
                  检查水量
                </button>
                <button class="btn btn-primary" id="nextBtn" disabled>
                  下一题 &#8594;
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- 实验后问卷（全部 8 题完成后显示） -->
      <div class="card post-survey" id="postSurvey" style="display:none;">
        <div class="card-header">
          <h3 class="card-title">实验后问卷</h3>
          <p class="card-subtitle">请根据真实感受回答，没有对错之分</p>
        </div>
        <div class="survey-body">
          <div class="survey-q">
            <p class="survey-q-title">1. 在答题过程中，你是否发现了比常规操作更短的解法？</p>
            <div class="survey-options" id="surveyQ1">
              <label class="survey-opt"><input type="radio" name="q1" value="yes"> 是</label>
              <label class="survey-opt"><input type="radio" name="q1" value="no"> 否</label>
              <label class="survey-opt"><input type="radio" name="q1" value="unsure"> 不确定</label>
            </div>
          </div>
          <div class="survey-q" id="surveyQ2" style="display:none;">
            <p class="survey-q-title">2. 你是从第几题开始意识到的？</p>
            <div class="survey-options" id="surveyQ2Options">
              <label class="survey-opt"><input type="radio" name="q2" value="3"> 第 3 题</label>
              <label class="survey-opt"><input type="radio" name="q2" value="4"> 第 4 题</label>
              <label class="survey-opt"><input type="radio" name="q2" value="5"> 第 5 题</label>
              <label class="survey-opt"><input type="radio" name="q2" value="6"> 第 6 题</label>
            </div>
          </div>
          <button class="btn btn-primary" id="surveySubmitBtn" disabled style="margin-top:var(--spacing-4);">
            提交问卷
          </button>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../../tracking/event-logger.js"></script>
<script src="water-jug.js"></script>
</body>
</html>
